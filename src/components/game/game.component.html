<h1 class="title"
  [attr.inert]="isReportModalOpen ? '' : null"
  [attr.aria-hidden]="isReportModalOpen ? 'true' : null">
  <small class="hidden-xs">{{ seedDescription }}</small>
</h1>
@if (gameState === 'loading') {
  <div class="container">
    Loading...
  </div>
}
@if (gameState === 'playing') {
  <div class="container-fluid">
    <app-item-tracker class="col-md-3 col-sm-4 col-xs-3 game-obj"
      [items]="items"
      [config]="config"
      [dungeonsData]="dungeonsData"
      [attr.inert]="isReportModalOpen ? '' : null"
      [attr.aria-hidden]="isReportModalOpen ? 'true' : null">
    </app-item-tracker>
    <app-map class="col-md-6 col-sm-8 col-xs-9 game-obj"
      [items]="items"
      [(currentMap)]="currentMap"
      [config]="config"
      (addedItem)="onAddedItem($event, 'get')"
      (viewItem)="onAddedItem($event, 'view')"
      (cantItem)="onCantItem($event)"
      (hintCheck)="onHintChecked($event)"
      (finishedDungeon)="onDungeonFinished($event)"
      (onGameFinished)="onGameFinished()">
    </app-map>
    <app-item-log class="col-md-3 col-xs-12 game-obj"
      [itemLogList]="itemLog"
      [items]="items"
      [attr.inert]="isReportModalOpen ? '' : null"
      [attr.aria-hidden]="isReportModalOpen ? 'true' : null">
    </app-item-log>
    <app-options
      [attr.inert]="isReportModalOpen ? '' : null"
      [attr.aria-hidden]="isReportModalOpen ? 'true' : null">
    </app-options>
    <app-game-menu class="col-sm-6 game-obj"
      [items]="items"
      [currentMap]="currentMap"
      [attr.inert]="isReportModalOpen ? '' : null"
      [attr.aria-hidden]="isReportModalOpen ? 'true' : null">
    </app-game-menu>
  </div>
}
@if (gameState === 'finished') {
  <div class="container">
    <div>
      <app-end-stats
        [items]="items"
        [config]="config">
      </app-end-stats>
    </div>
    <div class="finished-actions">
      <button class="btn btn-primary" type="button" (click)="onBackMainMenu()">
      Return to Main Menu</button>
      <button class="btn btn-primary" type="button" (click)="onContinuePlaying()">
      Continue Playing</button>
    </div>
  </div>
}

@if (isDebug) {
  <div class="debug-tools" aria-label="Debug tools"
    [attr.inert]="isReportModalOpen ? '' : null"
    [attr.aria-hidden]="isReportModalOpen ? 'true' : null">
    <button class="btn btn-warning debug-button" type="button" (click)="onCreditWarp()">
      Credits Warp
    </button>
  </div>
}
